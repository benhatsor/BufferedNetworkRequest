
<style>
body {
  font-family: system-ui;
}

.status.loading {
  color: #1a73e8;
}
</style>


<div class="status"><h2>Repositories</h2></div>


<script src="bufferedNetworkRequest.js"></script>
<script src="InvalidJSONParser.js"></script>

<script>

const statusEl = document.querySelector('.status');


statusEl.classList.add('loading');


const request = fetch('https://api.github.com/user/repos?visibility=all&sort=pushed&per_page=100&page=1', {
  headers: {
    authorization: 'token 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'
  },
  cache: 'no-store',
  method: 'GET'
});


let lastDataLen = 0;

bufferedNetworkRequest(request, (validData, done) => {
  
  if (done) {
    
    statusEl.classList.remove('loading');
    
    return;
    
  }
  
  
  if (!validData) validData = [];
  
  const validDataLen = validData.length;
  
  // remove already-received data
  validData = validData.slice(lastDataLen);
  
  lastDataLen = validDataLen;
  
  
  let out = '';

  validData.forEach(item => {

    out += '<p>' + item.name + '</p>';
    
  });
  
  statusEl.innerHTML += out;
  
});

</script>
