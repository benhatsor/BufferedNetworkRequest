<script>

async function bufferedNetworkRequest(request, updateCallback) {
  
  const response = await request;
  
  let respText = '';
  
  const res = new Response(new ReadableStream({
    
    async start(controller) {
      
      const reader = response.body.getReader();
      
      for (;;) {
        
        const {done, value} = await reader.read();
        
        if (!done) {
          
          const string = new TextDecoder().decode(value);
          
          respText += string;
          
          
          const validData = InvalidJSONParser.parse(respText);
          
          updateCallback(validData);
          
        } else {
          
          updateCallback(null, done);
          
          break;
          
        }
        
      }
      
      controller.close();
      
    }
    
  }));

}


// demo

const elStatus = document.getElementById('status');


const request = fetch('https://api.github.com/user/repos?visibility=all&sort=pushed&per_page=100&page=1', {
  headers: {
    //authorization: 'token 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'
    authorization: 'token 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'
  },
  method: 'GET'
});


// @@debug
let lastTime = performance.now();

let firstLoadTime;

let lastValidDataArrLength = 0;

bufferedNetworkRequest(request, (validData, done) => {

  if (done) {
    
    const currTime = performance.now();
    
    let deltaTime = firstLoadTime - currTime;
    deltaTime = +deltaTime.toFixed(2);
    
    elStatus.innerHTML += '<h1>perf. delta: ' + deltaTime + 'ms</b>';
    
    document.body.scrollTo(0, document.body.scrollHeight);
    
    return;
    
  }
  
  
  // validData can be null
  if (!validData) validData = [];
  
  
  const validDataLen = validData.length;
  
  // only add new data to DOM
  validData = validData.slice(lastValidDataArrLength);
  
  lastValidDataArrLength = validDataLen;
  
  
  let out = '';

  validData.forEach(item => {

    out += '<p>' + item.name + '</p>';
    
  });
  
  elStatus.innerHTML += out;
  
  
  
  // @@debug
  
  const currTime = performance.now();
  
  if (!firstLoadTime) {
    
    firstLoadTime = currTime;
    
  }
  
  
  let deltaTime = currTime - lastTime;
  deltaTime = +deltaTime.toFixed(2);
  
  elStatus.innerHTML += '<h2>loaded ' + validData.length + ' in +' + deltaTime + 'ms</h2>';
  
  lastTime = performance.now();
  
  
  debugLogs(validData);
  
  
  document.body.scrollTo(0, document.body.scrollHeight);
  
});

}
