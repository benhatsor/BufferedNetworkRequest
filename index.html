<script>

const elStatus = document.getElementById('status');
function status(text) {
  elStatus.innerHTML = text;
}

const elProgress = document.getElementById('progress');
function progress({loaded, total}) {
  elProgress.innerHTML = Math.round(loaded/total*100)+'%';
}

async function main() {
  status('downloading...');
  
  const response = await fetch("https://api.github.com/user/repos?visibility=all&sort=updated&per_page=100&page=1", {
    "headers": {
      "authorization": "token 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"
    },
    "method": "GET"
  });
  
  let loaded = 0;

  let respText = '';

  const res = new Response(new ReadableStream({
    async start(controller) {
      const reader = response.body.getReader();
      for (;;) {
        
        const {done, value} = await reader.read();
        
        console.log('update. done:', done);
        
        if (!done) {
          
          loaded += value.byteLength;
          
          status('progress (bytes): ' + loaded);
          
          
          // should reparse entire string until last parse index and compare the changes
          const string = new TextDecoder().decode(value);
          
          respText += string;
          
          
          console.groupCollapsed('value');
          console.log(string);
          console.groupEnd();
          
          
          const { validData, lastValidIndex } = InvalidJSONParser.parse(respText);
          
          console.log('validData', validData, 'lastValidIndex', lastValidIndex);
          
          
          // @@debug
          
          const validDataArrLength = validData.length;
          
          const realDataArrSlice = realData.slice(0, (validDataArrLength - 1));
          
          const realStr = JSON.stringify(realDataArrSlice),
                validStr = JSON.stringify(validData);
          
          const doesDataMatch = (realStr === validStr);
          
          console.log('doesDataMatch?', doesDataMatch);
          
          
          controller.enqueue(value);
          
        } else {
          
          const resp = JSON.parse(respText);
  
          console.log('resp', resp);
          
          break;
          
        }
        
      }
      controller.close();
    },
  }));
  
  status('download completed');

}

main();

</script>
