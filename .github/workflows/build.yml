
name: Build

on:
  push:
  
    branches: ['main']
    
    # see: https://docs.github.com/en/actions/using-workflows/triggering-a-workflow#example-including-paths
    paths:
      - 'src/**.js'
      - 'src/.scriptorder'
      - './build.js'
      
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
        
    - name: Build
      run: |
          npm install terser --save-dev
          node ".github/workflows/build.js"
    
    # save commits to GitHub
    - uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: 'Build'
